<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EA · Feedback Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F1EC;
  --surface:#FFFFFF;
  --surface2:#EDE9E1;
  --border:#DDD8CE;
  --text:#1C1A16;
  --text2:#6B6760;
  --text3:#A8A49E;
  --accent:#C4581E;
  --accent-light:#FAE8DF;
  --green:#1E7A48;
  --green-bg:#E3F5EC;
  --red:#BE2E2E;
  --red-bg:#FAEAEA;
  --amber:#9A5D0A;
  --amber-bg:#FDF3E3;
  --blue:#1A5FA8;
  --blue-bg:#E8F0FB;
  --r:10px;--rs:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;min-height:100vh}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px}
.header-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600}
.header-sub{font-size:11px;color:var(--text2)}
.header-right{display:flex;align-items:center;gap:10px}
.updated-pill{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;white-space:nowrap}
.refresh-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:7px 14px;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;transition:background .15s}
.refresh-btn:hover{background:#a8461a}
.refresh-btn:disabled{opacity:.6;cursor:not-allowed}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

/* ── LAYOUT ── */
.shell{max-width:1300px;margin:0 auto;padding:28px 32px}
.filters-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:24px}
.filters-bar label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
select,input[type=text]{font-family:inherit;font-size:12px;border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;background:var(--surface);color:var(--text);cursor:pointer;outline:none}
select:focus,input[type=text]:focus{border-color:var(--accent)}
.reset-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;padding:6px 4px;text-decoration:underline}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px}
.kpi-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-value{font-family:'Syne',sans-serif;font-size:30px;font-weight:700;line-height:1;color:var(--text)}
.kpi-unit{font-size:14px;color:var(--text3);font-weight:400}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:7px}
.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue)}

/* ── ALERT ── */
.alert{background:var(--red-bg);border:1px solid #f5c0c0;border-radius:var(--r);padding:11px 16px;display:flex;align-items:flex-start;gap:10px;margin-bottom:20px}
.alert-dot{width:18px;height:18px;min-width:18px;background:var(--red);border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.alert-text{font-size:12px;color:var(--red);line-height:1.5}

/* ── TABS ── */
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:22px}
.tab{font-size:12px;font-weight:500;padding:8px 16px;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:color .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:18px}
.g13{display:grid;grid-template-columns:1fr 3fr;gap:16px;margin-bottom:18px}
@media(max-width:900px){.g2,.g3,.g13{grid-template-columns:1fr}}
.section-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cnt-tag{font-size:10px;font-weight:500;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;color:var(--text2);font-family:'DM Sans',sans-serif}
.chart-box{position:relative;width:100%}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--surface2)}
.tbl-wrap{overflow-x:auto}
.sort-th{cursor:pointer;user-select:none}
.sort-th:hover{color:var(--accent)}
.sort-th.active-sort{color:var(--accent)}

/* ── SCORE BAR ── */
.sbar-wrap{display:flex;align-items:center;gap:8px}
.sbar{height:6px;border-radius:3px;background:var(--surface2);flex:1;min-width:50px}
.sbar-fill{height:100%;border-radius:3px}
.snum{font-size:12px;font-weight:600;min-width:30px;text-align:right;font-family:'DM Mono',monospace}

/* ── FLAGS ── */
.flag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.f-ok{background:var(--green-bg);color:var(--green)}
.f-warn{background:var(--amber-bg);color:var(--amber)}
.f-bad{background:var(--red-bg);color:var(--red)}
.f-na{background:var(--surface2);color:var(--text3)}

/* ── COMMENTS ── */
.comment-col{display:flex;flex-direction:column;gap:9px;max-height:420px;overflow-y:auto;padding-right:4px}
.comment-col::-webkit-scrollbar{width:4px}
.comment-col::-webkit-scrollbar-track{background:var(--surface2)}
.comment-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.cmt{background:var(--surface2);border-radius:var(--rs);padding:10px 12px;border-left:3px solid transparent}
.cmt.pos{border-left-color:var(--green)}
.cmt.neg{border-left-color:var(--red)}
.cmt.neu{border-left-color:var(--border)}
.cmt-text{font-size:12px;color:var(--text);line-height:1.5}
.cmt-meta{font-size:10px;color:var(--text3);margin-top:5px}

/* ── PAGINATION ── */
.pag{display:flex;align-items:center;gap:6px;margin-top:14px;justify-content:flex-end}
.pag-info{font-size:11px;color:var(--text3);margin-right:6px}
.pag-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--text)}
.pag-btn:hover{background:var(--surface2)}
.pag-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── LOADING ── */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;gap:16px}
.big-spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.loading-msg{font-size:13px;color:var(--text2)}

/* ── YEAR CHIPS ── */
.ychip{display:inline-block;font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin:1px}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:11px;color:var(--text2)}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}

.data-note{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 14px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.data-note a{color:var(--accent);text-decoration:none}
.data-note a:hover{text-decoration:underline}

.source-indicator{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}

/* no-data state */
.no-data{color:var(--text3);font-size:12px;text-align:center;padding:28px 0}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo">EA</div>
    <div>
      <div class="header-title">Feedback Dashboard</div>
      <div class="header-sub">Entrepreneurship Academy · Live Course Feedback Analytics</div>
    </div>
  </div>
  <div class="header-right">
    <span class="updated-pill" id="updatedPill">Loading…</span>
    <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
      <span id="refreshIcon">↻</span> Refresh
    </button>
  </div>
</header>

<div class="shell">

  <div class="data-note">
    <span>📊</span>
    Data sources:
    <a href="https://docs.google.com/spreadsheets/d/1KOTOAG-pKHIGEToNJG2XD1DQSJU8_hrPNhGEci0XKco/edit" target="_blank">Jotform (all years)</a> ·
    <a href="https://docs.google.com/spreadsheets/d/1-QbGinrW4tHVuN-S41gXSK4Qn8ySTfI23cifT4xcevU/edit" target="_blank">Y2 Google Form</a> ·
    <a href="https://docs.google.com/spreadsheets/d/1Yyt7Rl8HHoVDHUuJED4BEHVPz6dF-nmu9-J0xvZx1t8/edit" target="_blank">Y1 Google Form</a> ·
    <a href="https://docs.google.com/spreadsheets/d/1nR11cUWPksXrzQvg2lQn2Y-862s4699AAsEXOUcEtjU/edit" target="_blank">Y3 Google Form</a>
    · Responses from Sep 1 2025 onwards · Click <strong>Refresh</strong> to pull latest data.
  </div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <label>Year:</label>
    <select id="fYear" onchange="applyFilters()">
      <option value="">All</option>
      <option value="1">Year 1</option>
      <option value="2">Year 2</option>
      <option value="3">Year 3</option>
      <option value="4">Year 4</option>
    </select>
    <div class="sep"></div>
    <label>Expert:</label>
    <select id="fExpert" onchange="applyFilters()">
      <option value="">All experts</option>
    </select>
    <div class="sep"></div>
    <label>Course:</label>
    <select id="fCourse" onchange="applyFilters()">
      <option value="">All courses</option>
    </select>
    <div class="sep"></div>
    <label>Source:</label>
    <select id="fSource" onchange="applyFilters()">
      <option value="">All sources</option>
      <option value="Jotform">Jotform</option>
      <option value="Y1 Form">Y1 Form</option>
      <option value="Y2 Form">Y2 Form</option>
      <option value="Y3 Form">Y3 Form</option>
    </select>
    <button class="reset-btn" onclick="resetFilters()">Reset</button>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi"><div class="loading-msg" style="font-size:12px;color:var(--text3)">Loading…</div></div>
  </div>

  <!-- ALERT -->
  <div id="alertZone"></div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab" onclick="switchTab('experts',this)">Expert Analysis</button>
    <button class="tab" onclick="switchTab('courses',this)">Course Analysis</button>
    <button class="tab" onclick="switchTab('comments',this)">Student Comments</button>
  </div>

  <div id="tab-overview"></div>
  <div id="tab-experts"  style="display:none"></div>
  <div id="tab-courses"  style="display:none"></div>
  <div id="tab-comments" style="display:none"></div>

</div>

function parseCSV(text) {
  const lines = text.split('\n').filter(l=>l.trim());
  if (lines.length < 2) return {headers:[], rows:[]};
  function pl(line) {
    const res=[]; let cur='',inQ=false;
    for (let i=0;i<line.length;i++) {
      const c=line[i];
      if (c==='"'&&!inQ){inQ=true;continue;}
      if (c==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;continue;}
      if (c===','&&!inQ){res.push(cur);cur='';continue;}
      cur+=c;
    }
    res.push(cur); return res;
  }
  const headers = pl(lines[0]).map(h=>h.trim());
  const rows = lines.slice(1).map(line=>{
    const vals=pl(line); const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim();});
    return obj;
  });
  return {headers, rows};
}

function normJotform(rows) {
  return rows.map(r=>{

    const q = parseInt(r['How would you rate the overall quality of the course/workshop? ']||r['How would you rate the overall quality of the course/workshop?']||'')||null;
    return {
      date:d.toISOString().slice(0,10), source:'Jotform',
      year:parseInt(r['Year'])||null, team:r['Team']||'',
      course:r['Course']||'', expert:r['Expert']||'',
      quality:q,

      engaging:parseInt(r['How engaging was the expert?']||'')||null,

      beneficial:r['What aspects of the course/workshop did you find most beneficial?']||'',

      suggestions:r['Do you have any suggestions for the expert to improve future sessions?']||'',
    };
  }).filter(Boolean);
}

function normGoogleForm(rows, year) {
  const out=[];
  rows.forEach(r=>{
    const d=new Date(r['Timestamp']);
    if (isNaN(d)||d<CUTOFF) return;
    Object.keys(r).forEach(col=>{
      const m=col.match(/How would you rate the overall quality.*?\[(.+?)\]/);
      if (!m) return;
      const course=m[1].trim();
      const quality=SCORE_MAP[r[col]]||null;
      if (!quality) return;
      const mCol=Object.keys(r).find(k=>k.includes('How well did the course')&&k.includes('['+course+']'));
      const meetNeeds=mCol?(SCORE_MAP[r[mCol]]||null):null;
      let engaging=null, expert='';
      const eCol=Object.keys(r).find(k=>k.includes('How engaging was the expert?')&&k.includes('(')&&k.toLowerCase().includes(course.toLowerCase().split(' ')[0]));
      if (eCol){const em=eCol.match(/\[(.+?)\s*\((.+?)\)\]/);if(em)expert=em[1].trim();engaging=ENGAGE_MAP[r[eCol]]||null;}
      const rCol=Object.keys(r).find(k=>k.includes('Would you recommend')&&k.includes('['+course+']'));
      const recommend=rCol?(r[rCol]==='Yes'?true:r[rCol]==='No'?false:null):null;
      const cCols=Object.keys(r).filter(k=>k.trim()===course);
      const comment=cCols.length?r[cCols[0]]:'';
      out.push({date:d.toISOString().slice(0,10),source:'Y'+year+' Form',year,team:'',course,expert,quality,meetNeeds,engaging,recommend,beneficial:'',improve:'',suggestions:comment||''});
    });
  });
  return out;
}

  for (const s of SHEETS) {
    try {
      const url=`https://docs.google.com/spreadsheets/d/${s.id}/export?format=csv&gid=${s.gid}`;
      const res=await fetch(url);
      if (!res.ok) throw new Error('HTTP '+res.status);
      const text=await res.text();
      const {rows}=parseCSV(text);
      const normed=s.type==='jotform'?normJotform(rows):normGoogleForm(rows,s.year);
      fresh.push(...normed);
    } catch(e) { console.warn(s.key,e.message); }
  }
  if (fresh.length > 0) {
    allRows = fresh;
    buildFilters();
    applyFilters();
    setUpdated('Live · '+new Date().toLocaleString('ro-RO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}));
  } else {
    setUpdated('Embedded data · live fetch unavailable');
  }
  btn.disabled=false;
  icon.innerHTML='↻';
  // Auto-refresh every 30 min
  setTimeout(doRefresh, 30*60*1000);
}

function setUpdated(msg){ document.getElementById('updatedPill').textContent=msg; }

/* ════════ FILTERS ════════ */
function buildFilters() {
  const experts=[...new Set(allRows.filter(r=>r.expert).map(r=>r.expert))].sort();
  const courses=[...new Set(allRows.filter(r=>r.course).map(r=>r.course))].sort();
  const fe=document.getElementById('fExpert');
  const fc=document.getElementById('fCourse');
  const curE=fe.value, curC=fc.value;
  fe.innerHTML='<option value="">All experts</option>'+experts.map(e=>`<option value="${e}"${e===curE?'selected':''}>${e}</option>`).join('');
  fc.innerHTML='<option value="">All courses</option>'+courses.map(c=>`<option value="${c}"${c===curC?'selected':''}>${c}</option>`).join('');
}

function applyFilters() {
  const yr=document.getElementById('fYear')?.value;
  const ex=document.getElementById('fExpert')?.value;
  const co=document.getElementById('fCourse')?.value;
  const src=document.getElementById('fSource')?.value;
  filteredRows=allRows.filter(r=>{
    if (yr&&r.year!==parseInt(yr)) return false;
    if (ex&&r.expert!==ex) return false;
    if (co&&r.course!==co) return false;
    if (src&&r.source!==src) return false;
    return true;
  });
  expertPage=1;
  renderKPIs();
  renderAlerts();
  renderCurrentTab();
}

function resetFilters(){
  ['fYear','fExpert','fCourse','fSource'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  applyFilters();
}

/* ════════ HELPERS ════════ */
function avg(arr){const n=arr.filter(x=>x!==null&&x!==0&&!isNaN(x));return n.length?n.reduce((a,b)=>a+b,0)/n.length:null;}
function scoreColor(s){return s>=4.2?'#1E7A48':s>=3.4?'#9A5D0A':'#BE2E2E';}
function flagCls(s){return s>=4.2?'f-ok':s>=3.2?'f-warn':'f-bad';}
function flagTxt(s){return s>=4.2?'✓ Good':s>=3.2?'⚠ Review':'✕ Action needed';}

function sbar(score,max){
  if (!score) return '<span style="color:var(--text3);font-size:11px">—</span>';
  const pct=Math.min(100,(score/max)*100);
  const c=scoreColor(score);
  return `<div class="sbar-wrap"><div class="sbar"><div class="sbar-fill" style="width:${pct.toFixed(1)}%;background:${c}"></div></div><span class="snum" style="color:${c}">${score.toFixed(2)}</span></div>`;
}

/* ════════ KPIs ════════ */
function renderKPIs(){
  const total=filteredRows.length;
  const qs=filteredRows.map(r=>r.quality).filter(v=>v&&v>0);
  const ms=filteredRows.map(r=>r.meetNeeds).filter(v=>v&&v>0);
  const es=filteredRows.map(r=>r.engaging).filter(v=>v&&v>0);
  const recs=filteredRows.filter(r=>r.recommend!==null);
  const recPct=recs.length?Math.round(recs.filter(r=>r.recommend).length/recs.length*100):null;
  const avgQ=avg(qs), avgM=avg(ms), avgE=avg(es);
  const experts=new Set(filteredRows.filter(r=>r.expert).map(r=>r.expert));
  const courses=new Set(filteredRows.filter(r=>r.course).map(r=>r.course));

  document.getElementById('kpiGrid').innerHTML=`
    <div class="kpi">
      <div class="kpi-label">Total responses</div>
      <div class="kpi-value">${total.toLocaleString()}</div>
      <div class="kpi-sub">${courses.size} courses · ${experts.size} experts</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Avg course quality</div>
      <div class="kpi-value" style="color:${avgQ?scoreColor(avgQ):'var(--text3)'}">${avgQ?avgQ.toFixed(2):'—'}<span class="kpi-unit">/5</span></div>
      ${avgQ?`<span class="badge ${flagCls(avgQ)}">${flagTxt(avgQ)}</span>`:''}
    </div>
    <div class="kpi">
      <div class="kpi-label">Meets learning needs</div>
      <div class="kpi-value" style="color:${avgM?scoreColor(avgM):'var(--text3)'}">${avgM?avgM.toFixed(2):'—'}<span class="kpi-unit">/5</span></div>
      <div class="kpi-sub">${ms.length} responses</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Expert engagement</div>
      <div class="kpi-value" style="color:${avgE?scoreColor(avgE):'var(--text3)'}">${avgE?avgE.toFixed(2):'—'}<span class="kpi-unit">/5</span></div>
      <div class="kpi-sub">${es.length} responses</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Would recommend</div>
      <div class="kpi-value" style="color:${recPct!==null?(recPct>=70?'#1E7A48':recPct>=50?'#9A5D0A':'#BE2E2E'):'var(--text3)'}">${recPct!==null?recPct+'%':'—'}</div>
      <div class="kpi-sub">${recs.filter(r=>r.recommend).length} of ${recs.length} students</div>
    </div>`;
}

/* ════════ ALERTS ════════ */
function renderAlerts(){
  const byE={};
  filteredRows.filter(r=>r.expert).forEach(r=>{if(!byE[r.expert])byE[r.expert]=[];byE[r.expert].push(r);});
  const bad=Object.entries(byE).filter(([,rows])=>{
    const q=avg(rows.map(r=>r.quality).filter(v=>v&&v>0));
    return q!==null&&q<3.0&&rows.length>=3;
  }).map(([ex,rows])=>{
    const q=avg(rows.map(r=>r.quality).filter(v=>v&&v>0));
    return `<strong>${ex}</strong> (avg ${q.toFixed(1)}/5, ${rows.length} responses)`;
  });
  document.getElementById('alertZone').innerHTML=bad.length
    ?`<div class="alert"><div class="alert-dot">!</div><div class="alert-text">Action needed — ${bad.length} expert(s) scoring below 3.0/5: ${bad.join('; ')}</div></div>`
    :'';
}

/* ════════ TAB SWITCHING ════════ */
function switchTab(tab, btn){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['overview','experts','courses','comments'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
  });
  renderCurrentTab();
}
function renderCurrentTab(){
  if(activeTab==='overview') renderOverview();
  else if(activeTab==='experts') renderExperts();
  else if(activeTab==='courses') renderCourses();
  else if(activeTab==='comments') renderComments();
}

function sortExp(col){

function filterRows(tbodyId,search,cellIdx){

}

          <div class="cmt ${cls}">
            <div class="cmt-text">${r.improve||r.beneficial||r.suggestions}</div>
            <div class="cmt-meta">${[r.expert,r.course,r.date,r.source].filter(Boolean).join(' · ')}</div>
          </div>`).join(''):'<div class="no-data">No comments in this category.</div>'}
      </div>
    </div>`;

  const impItems=improvements.map(r=>({...r,beneficial:'',suggestions:''}));
  const benItems=beneficial.map(r=>({...r,improve:'',suggestions:''}));
  const sugItems=suggestions.map(r=>({...r,beneficial:'',improve:''}));

  el.innerHTML=`
    <div class="g3">
      ${cmtCard('What could be improved',impItems,'neg')}
      ${cmtCard('What was most beneficial',benItems,'pos')}
      ${cmtCard('Suggestions for experts',sugItems,'neu')}
    </div>`;

  // Fix the text rendering
  el.querySelectorAll('.cmt-text').forEach((div,i)=>{
    const allCommentRows=[...impItems,...benItems,...sugItems];
    if(allCommentRows[i]) {
      const r=allCommentRows[i];
      div.textContent=r.improve||r.beneficial||r.suggestions||'';
    }
  });
}

function destroyCharts(ids){ids.forEach(id=>{if(charts[id]){try{charts[id].destroy();}catch(e){}delete charts[id];}});}
</script>
</body>
</html>
