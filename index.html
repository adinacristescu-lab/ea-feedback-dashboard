<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EA · Feedback Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F1EC;--surface:#FFFFFF;--surface2:#EDE9E1;--border:#DDD8CE;--text:#1C1A16;--text2:#6B6760;--text3:#A8A49E;--accent:#C4581E;--green:#1E7A48;--green-bg:#E3F5EC;--red:#BE2E2E;--red-bg:#FAEAEA;--amber:#9A5D0A;--amber-bg:#FDF3E3;--blue:#1A5FA8;--blue-bg:#E8F0FB;--r:10px;--rs:6px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px}
.header-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600}
.header-sub{font-size:11px;color:var(--text2)}
.header-right{display:flex;align-items:center;gap:10px}
.updated-pill{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;white-space:nowrap}
.refresh-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);padding:7px 14px;font-size:12px;font-family:inherit;font-weight:500;cursor:pointer}
.refresh-btn:hover{background:#a8461a}.refresh-btn:disabled{opacity:.6;cursor:not-allowed}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.shell{max-width:1300px;margin:0 auto;padding:24px 32px}
.filters-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filters-bar label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
select,input[type=text]{font-family:inherit;font-size:12px;border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;background:var(--surface);color:var(--text);cursor:pointer;outline:none}
select:focus,input[type=text]:focus{border-color:var(--accent)}
.reset-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;padding:6px 4px;text-decoration:underline}
.sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.kpi-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;line-height:1;color:var(--text)}
.kpi-unit{font-size:13px;color:var(--text3);font-weight:400}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:6px}
.b-green{background:var(--green-bg);color:var(--green)}.b-amber{background:var(--amber-bg);color:var(--amber)}.b-red{background:var(--red-bg);color:var(--red)}
.alert{background:var(--red-bg);border:1px solid #f5c0c0;border-radius:var(--r);padding:11px 16px;display:flex;align-items:flex-start;gap:10px;margin-bottom:16px}
.alert-dot{width:18px;height:18px;min-width:18px;background:var(--red);border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.alert-text{font-size:12px;color:var(--red);line-height:1.5}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{font-size:12px;font-weight:500;padding:8px 16px;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:color .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.tab:hover:not(.active){color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:18px}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
.section-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.cnt-tag{font-size:10px;font-weight:500;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;color:var(--text2);font-family:'DM Sans',sans-serif}
.chart-box{position:relative;width:100%}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover,.tbl th.active-sort{color:var(--accent)}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tbody tr:hover td{background:var(--surface2)}.tbl-wrap{overflow-x:auto}
.sbar-wrap{display:flex;align-items:center;gap:8px}.sbar{height:6px;border-radius:3px;background:var(--surface2);flex:1;min-width:50px}
.sbar-fill{height:100%;border-radius:3px}.snum{font-size:12px;font-weight:600;min-width:30px;text-align:right;font-family:'DM Mono',monospace}
.flag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.f-ok{background:var(--green-bg);color:var(--green)}.f-warn{background:var(--amber-bg);color:var(--amber)}.f-bad{background:var(--red-bg);color:var(--red)}.f-na{background:var(--surface2);color:var(--text3)}
.comment-col{display:flex;flex-direction:column;gap:9px;max-height:500px;overflow-y:auto;padding-right:4px}
.comment-col::-webkit-scrollbar{width:4px}.comment-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.cmt{background:var(--surface2);border-radius:var(--rs);padding:10px 12px;border-left:3px solid transparent}
.cmt.pos{border-left-color:var(--green)}.cmt.neg{border-left-color:var(--red)}.cmt.neu{border-left-color:var(--border)}
.cmt-text{font-size:12px;color:var(--text);line-height:1.5}.cmt-meta{font-size:10px;color:var(--text3);margin-top:5px}
.pag{display:flex;align-items:center;gap:6px;margin-top:14px;justify-content:flex-end}
.pag-info{font-size:11px;color:var(--text3);margin-right:6px}
.pag-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;color:var(--text)}
.pag-btn:hover{background:var(--surface2)}.pag-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ychip{display:inline-block;font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin:1px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:10px;font-size:11px;color:var(--text2)}
.legend-item{display:flex;align-items:center;gap:5px}.legend-dot{width:10px;height:10px;border-radius:2px}
.data-note{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.data-note a{color:var(--accent);text-decoration:none}.data-note a:hover{text-decoration:underline}
.no-data{color:var(--text3);font-size:12px;text-align:center;padding:28px 0}
.ctx-banner{font-size:11px;color:var(--blue);background:var(--blue-bg);border:1px solid #b8d4f0;border-radius:var(--rs);padding:6px 12px;margin-bottom:14px;display:none}
.ctx-banner.on{display:block}
</style>
</head>

    <label>Expert:</label>

    <div class="sep"></div>
    <label>Course:</label>
    <select id="fCourse" onchange="applyFilters()"><option value="">All courses</option></select>
    <div class="sep"></div>

  </div>

  <div class="kpi-grid" id="kpiGrid"></div>
  <div id="alertZone"></div>

  <div class="tab-bar">

/* ══════════════════════════════════════════════════════
   JOTFORM COURSE CODE STANDARDISATION
   For Jotform, courses already have codes in the Course column.
   We parse the code from the string directly.
   ══════════════════════════════════════════════════════ */
function stdJotformCourse(raw) {
  if (!raw) return null;
  // Extract code like "0201EE" from strings like "0201EE - Entrepreneurial Research 2"
  const m = raw.match(/^(0\d{3}[A-Z]+)/);
  if (m) return m[1];
  return null;
}

   EXPERT-COURSE CORRECTION for Jotform data
   Fix known mismatches where expert is tagged to wrong course
   ══════════════════════════════════════════════════════ */
function fixJotformCourse(yr, expertCanon, code) {
  if (yr===2 && expertCanon==='Alexandrina Pauceanu' && code==='0203EE') return '0201EE';
  if (yr===2 && expertCanon==='Valentin Maior' && code==='0201EE') return '0203EE';
  return code;
}

function parseCSV(t){
  const lines=t.split('\n').filter(l=>l.trim());
  if(lines.length<2)return{h:[],rows:[]};
  function pl(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'&&!q){q=true;continue;}if(ch==='"'&&q){if(line[i+1]==='"'){c+='"';i++;}else q=false;continue;}if(ch===','&&!q){r.push(c);c='';continue;}c+=ch;}r.push(c);return r;}
  const h=pl(lines[0]).map(x=>x.trim());
  return{h,rows:lines.slice(1).map(l=>{const v=pl(l);const o={};h.forEach((k,i)=>{o[k]=(v[i]||'').trim();});return o;})};
}

function mkRow(date,src,yr,team,code,expert,q,mN,en,rec,ben,imp,sug){
  const d=COURSES[code];
  return{date,source:src,year:yr,team,
    courseCode:code||'',
    courseName:d?`${code} — ${d.name}`:code||'',
    courseShort:d?d.name:code||'',
    expert,quality:q,meetNeeds:mN,engaging:en,recommend:rec,
    beneficial:ben||'',improve:imp||'',suggestions:sug||''};
}

/* ══════════════════════════════════════════════════════
   NORMALISE JOTFORM
   ══════════════════════════════════════════════════════ */
function normJ(rows){
  return rows.map(r=>{
    const d=new Date(r['Submission Date']);
    if(isNaN(d)||d<CUTOFF)return null;
    const yr=parseInt(r['Year'])||null;
    const ex=canonE(r['Expert']||'');
    let code=stdJotformCourse(r['Course']||'');
    if(code)code=fixJotformCourse(yr,ex,code);
    if(!code)code=r['Course']||'';
    const q=parseInt(r['How would you rate the overall quality of the course/workshop? ']||r['How would you rate the overall quality of the course/workshop?']||'')||null;
    return mkRow(
      d.toISOString().slice(0,10),'Jotform',yr,r['Team']||'',code,ex,q,
      parseInt(r['How well did the course/workshop meet your learning needs and goals?']||'')||null,
      parseInt(r['How engaging was the expert?']||'')||null,
      r['Would you recommend this expert for future courses/workshops?']==='Yes'?true:r['Would you recommend this expert for future courses/workshops?']==='No'?false:null,
      r['What aspects of the course/workshop did you find most beneficial?']||'',
      r['What areas of the course/workshop do you think could be improved?']||'',
      r['Do you have any suggestions for the expert to improve future sessions?']||''
    );
  }).filter(Boolean);
}

/* ══════════════════════════════════════════════════════
   NORMALISE GOOGLE FORM  ← COMPLETELY REWRITTEN
   
   Key fix: use GFORM_EXPERTS and COURSE_CODE_MAP exact lookups
   instead of keyword matching. This eliminates all collisions.
   
   For courses taught by multiple experts (e.g. Dialogue),
   we create one row per student per expert — each representing
   that student's feedback, attributed to both experts.
   The quality rating is the same (student rated the course once).
   ══════════════════════════════════════════════════════ */
function normG(rows, yr){
  const out=[];
  const expertMap = GFORM_EXPERTS[yr] || {};
  const codeMap = COURSE_CODE_MAP[yr] || {};
  
  rows.forEach(r=>{
    const d=new Date(r['Timestamp']);
    if(isNaN(d)||d<CUTOFF)return;
    
    // Get engagement ratings per expert from columns
    const engageByExpert = {};
    Object.keys(r).forEach(col => {
      if (!col.includes('How engaging was the expert?')) return;
      const m = col.match(/\[(.+?)\s*\((.+?)\)\]/);
      if (!m) return;
      const expertRaw = m[1].trim();
      const expertCanon = canonE(expertRaw);
      const engagement = {
        'Extremely engaging':5,'Very engaging':4,'Engaging':3,'Somehow engaging':2,'Not engaging':1
      }[r[col]] || null;
      if (expertCanon) engageByExpert[expertCanon] = engagement;
    });
    
    // Get recommendation per expert
    const recByExpert = {};
    Object.keys(r).forEach(col => {
      if (!col.includes('Would you recommend this expert')) return;
      const m = col.match(/\[(.+?)\s*\((.+?)\)\]/);
      if (!m) return;
      const expertCanon = canonE(m[1].trim());
      if (expertCanon) recByExpert[expertCanon] = r[col]==='Yes'?true:r[col]==='No'?false:null;
    });
    
    // Process each quality rating column
    Object.keys(r).forEach(col => {
      const m = col.match(/How would you rate the overall quality.*?\[(.+?)\]/);
      if (!m) return;
      const rawCourse = m[1].trim();
      if (rawCourse === 'Row 10') return; // skip empty placeholder column
      
      const quality = SM[r[col]] || null;
      if (!quality) return; // skip blank ratings
      
      // Get course code from exact lookup table
      const code = codeMap[rawCourse];
      if (!code) return; // skip unknown courses
      
      // Get experts for this course from exact lookup table
      const experts = expertMap[rawCourse] || [];
      
      // Get meet needs rating
      const mCol = Object.keys(r).find(k => k.includes('How well did the course') && k.includes('['+rawCourse+']'));
      const meetNeeds = mCol ? (SM[r[mCol]] || null) : null;
      
      // Get comment for this course
      const cCols = Object.keys(r).filter(k => k.trim() === rawCourse);
      const sug = cCols.length ? r[cCols[0]] : '';
      
      if (experts.length === 0) {
        // No known expert — create one row with no expert
        out.push(mkRow(d.toISOString().slice(0,10),'Y'+yr+' Form',yr,'',code,'',quality,meetNeeds,null,null,'','',sug));
      } else {
        // Create one row per expert (different teams taught by different experts)
        experts.forEach(expertCanon => {
          const en = engageByExpert[expertCanon] || null;
          const rec = recByExpert[expertCanon] || null;
          out.push(mkRow(d.toISOString().slice(0,10),'Y'+yr+' Form',yr,'',code,expertCanon,quality,meetNeeds,en,rec,'','',sug));
        });
      }
    });
  });
  return out;
}

  for(const s of SHEETS){

      fresh.push(...(s.type==='j'?normJ(rows):normG(rows,s.yr)));

/* ══════ HELPERS ══════ */
function avg(a){const n=a.filter(x=>x!==null&&x!==0&&!isNaN(x));return n.length?n.reduce((a,b)=>a+b,0)/n.length:null;}
function sc(s){return s>=4.2?'#1E7A48':s>=3.4?'#9A5D0A':'#BE2E2E';}
function fc2(s){return s>=4.2?'f-ok':s>=3.2?'f-warn':'f-bad';}
function ft(s){return s>=4.2?'✓ Good':s>=3.2?'⚠ Review':'✕ Action needed';}
function sbar(s,m){
  if(!s||s===0)return'<span style="color:var(--text3);font-size:11px">—</span>';
  const c=sc(s);
  return`<div class="sbar-wrap"><div class="sbar"><div class="sbar-fill" style="width:${Math.min(100,s/m*100).toFixed(1)}%;background:${c}"></div></div><span class="snum" style="color:${c}">${s.toFixed(2)}</span></div>`;
}
function skip(v){return!v||v.trim().length<4||['-','.','..','/','n/a','na','nothing','none','no','nope'].includes(v.trim().toLowerCase());}
function dC(ids){ids.forEach(id=>{if(CH[id]){try{CH[id].destroy();}catch(e){}delete CH[id];}});}

function renderAlerts(){

    const mN=avg(rows.map(r=>r.meetNeeds).filter(v=>v&&v>0));
    const recs=rows.filter(r=>r.recommend!==null);
    const rp=recs.length?Math.round(recs.filter(r=>r.recommend).length/recs.length*100):null;
    const cos=[...new Set(rows.map(r=>r.courseName).filter(Boolean))];
    const yrs=[...new Set(rows.map(r=>r.year).filter(Boolean))].sort();
    return{name:ex,count:rows.length,quality:q,engage:en,meet:mN,recPct:rp,courses:cos,years:yrs};
  });
  data.sort((a,b)=>{const av=a[expSortCol]??-1,bv=b[expSortCol]??-1;return expSortDir==='desc'?bv-av:av-bv;});
  const tp=Math.ceil(data.length/PER);if(expPage>tp)expPage=1;
  const pg=data.slice((expPage-1)*PER,expPage*PER);
  const sh=(col,lbl)=>{const a=expSortCol===col;return`<th class="${a?'active-sort':''}" onclick="srtE('${col}')">${lbl} ${a?(expSortDir==='desc'?'▼':'▲'):'⇅'}</th>`;};
  const t10=data.filter(e=>e.quality!==null&&e.count>=2).slice(0,10);
  el.innerHTML=`
    <div class="card" style="margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="section-label" style="margin:0">Expert performance <span class="cnt-tag">${data.length} experts</span></div>
        <input type="text" placeholder="Search expert…" style="width:200px" oninput="fTb('eTb',this.value,0)">
      </div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Expert</th><th>Year(s)</th><th>Courses</th>${sh('count','Responses')}${sh('quality','Quality /5')}${sh('engage','Engagement /5')}${sh('meet','Meets Needs /5')}${sh('recPct','Recommend %')}<th>Status</th></tr></thead>
        <tbody id="eTb">
          ${pg.map(e=>`<tr>
            <td style="font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</td>
            <td>${e.years.map(y=>`<span class="ychip">Y${y}</span>`).join('')}</td>
            <td style="font-size:11px;color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.courses.map(c=>c.split('—')[1]||c).join(', ')}">${e.courses.slice(0,2).map(c=>(c.split('—')[1]||c).trim()).join(', ')}${e.courses.length>2?' +'+(e.courses.length-2):''}</td>
            <td style="font-family:'DM Mono',monospace">${e.count}</td>
            <td>${sbar(e.quality,5)}</td><td>${sbar(e.engage,5)}</td><td>${sbar(e.meet,5)}</td>
            <td>${e.recPct!==null?`<span style="font-weight:600;color:${e.recPct>=70?'#1E7A48':e.recPct>=50?'#9A5D0A':'#BE2E2E'}">${e.recPct}%</span>`:'—'}</td>
            <td><span class="flag ${e.quality?fc2(e.quality):'f-na'}">${e.quality?ft(e.quality):'No data'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table></div>
      ${tp>1?`<div class="pag"><span class="pag-info">${data.length} experts · page ${expPage}/${tp}</span>${Array.from({length:tp},(_,i)=>`<button class="pag-btn${i+1===expPage?' active':''}" onclick="gEP(${i+1})">${i+1}</button>`).join('')}</div>`:''}
    </div>
    <div class="card">
      <div class="section-label">Top 10 experts by quality (min 2 responses)</div>
      <div class="chart-box" style="height:${Math.max(280,t10.length*44+70)}px"><canvas id="cEB" role="img" aria-label="Top experts"></canvas></div>
    </div>`;
  dC(['cEB']);
  if(t10.length)CH.cEB=new Chart(document.getElementById('cEB'),{type:'bar',data:{labels:t10.map(e=>e.name.length>26?e.name.slice(0,26)+'…':e.name),datasets:[{data:t10.map(e=>parseFloat(e.quality.toFixed(2))),backgroundColor:t10.map(e=>e.quality>=4.2?'#78c0a8':e.quality>=3.4?'#d4c87a':'#f08080'),borderWidth:0,borderRadius:5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:0,max:5,grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11}}},y:{grid:{display:false},ticks:{font:{size:11}}}}}});
}
function srtE(col){if(expSortCol===col)expSortDir=expSortDir==='desc'?'asc':'desc';else{expSortCol=col;expSortDir='desc';}expPage=1;renderExperts();}
function gEP(p){expPage=p;renderExperts();}
function fTb(id,s,ci){document.querySelectorAll('#'+id+' tr').forEach(r=>{r.style.display=r.cells[ci]?.textContent.toLowerCase().includes(s.toLowerCase())?'':'none';});}

/* ══════ COURSES ══════ */
function renderCourses(){
  const el=document.getElementById('tab-courses');
  const byC={};
  filteredRows.filter(r=>r.courseCode).forEach(r=>{if(!byC[r.courseCode])byC[r.courseCode]=[];byC[r.courseCode].push(r);});
  const data=Object.entries(byC).map(([code,rows])=>{
    const def=COURSES[code];
    const q=avg(rows.map(r=>r.quality).filter(v=>v&&v>0));
    const mN=avg(rows.map(r=>r.meetNeeds).filter(v=>v&&v>0));
    const exps=[...new Set(rows.map(r=>r.expert).filter(Boolean))];
    const yrs=[...new Set(rows.map(r=>r.year).filter(Boolean))].sort();
    return{code,shortName:def?def.name:code,count:rows.length,quality:q,meet:mN,experts:exps,years:yrs};
  }).sort((a,b)=>(b.quality||0)-(a.quality||0));
  const b10=[...data].filter(c=>c.quality!==null&&c.count>=2).sort((a,b)=>a.quality-b.quality).slice(0,10);
  el.innerHTML=`
    <div class="card" style="margin-bottom:18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="section-label" style="margin:0">Course performance <span class="cnt-tag">${data.length} courses</span></div>
        <input type="text" placeholder="Search course…" style="width:220px" oninput="fTb('cTb',this.value,1)">
      </div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Code</th><th>Course Name</th><th>Year(s)</th><th>Expert(s)</th><th>Responses</th><th>Avg Quality /5</th><th>Meets Needs /5</th><th>Status</th></tr></thead>
        <tbody id="cTb">
          ${data.map(c=>`<tr>
            <td style="font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap;color:var(--text2)">${c.code}</td>
            <td style="font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.shortName}">${c.shortName}</td>
            <td>${c.years.map(y=>`<span class="ychip">Y${y}</span>`).join('')}</td>
            <td style="font-size:11px;color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.experts.join(', ')}">${c.experts.slice(0,2).join(', ')}${c.experts.length>2?' +'+(c.experts.length-2):''}</td>
            <td style="font-family:'DM Mono',monospace">${c.count}</td>
            <td>${sbar(c.quality,5)}</td><td>${sbar(c.meet,5)}</td>
            <td><span class="flag ${c.quality?fc2(c.quality):'f-na'}">${c.quality?ft(c.quality):'No data'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="section-label">Courses needing attention (lowest quality, min 2 responses)</div>
      <div class="chart-box" style="height:${Math.max(280,b10.length*44+70)}px"><canvas id="cCB" role="img" aria-label="Courses needing attention"></canvas></div>
    </div>`;
  dC(['cCB']);
  if(b10.length)CH.cCB=new Chart(document.getElementById('cCB'),{type:'bar',data:{labels:b10.map(c=>c.shortName.length>34?c.shortName.slice(0,34)+'…':c.shortName),datasets:[{data:b10.map(c=>parseFloat(c.quality.toFixed(2))),backgroundColor:b10.map(c=>c.quality>=4.2?'#78c0a8':c.quality>=3.4?'#d4c87a':'#f08080'),borderWidth:0,borderRadius:5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:0,max:5,grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11}}},y:{grid:{display:false},ticks:{font:{size:10}}}}}});
}

/* ══════ COMMENTS ══════ */
function renderComments(){
  const el=document.getElementById('tab-comments');
  const imp=filteredRows.filter(r=>!skip(r.improve));
  const ben=filteredRows.filter(r=>!skip(r.beneficial));
  const sug=filteredRows.filter(r=>!skip(r.suggestions)&&(r.suggestions||'').length>5);
  const card=(title,items,tf,cls)=>`
    <div class="card">
      <div class="section-label">${title} <span class="cnt-tag">${items.length}</span></div>
      <div class="comment-col">
        ${items.length?items.slice(0,50).map(r=>`
          <div class="cmt ${cls}">
            <div class="cmt-text">${(tf(r)||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            <div class="cmt-meta">${[r.expert,r.courseCode?r.courseCode+' · '+r.courseShort:'',r.date].filter(Boolean).join(' · ')}</div>
          </div>`).join(''):'<div class="no-data">No comments.</div>'}
      </div>
    </div>`;
  el.innerHTML=`<div class="g3">
    ${card('What could be improved',imp,r=>r.improve,'neg')}
    ${card('What was beneficial',ben,r=>r.beneficial,'pos')}
    ${card('Suggestions for experts',sug,r=>r.suggestions,'neu')}
  </div>`;
}
</script>
</body>
</html>
